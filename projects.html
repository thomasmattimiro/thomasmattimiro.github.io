<h1>Engineering Projects</h1>

<p>
    Explore projects I've supported throughout my GIS,

</p>

</div>
```

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([44.9778, -93.2650], 5);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

async function loadProjects() {

    try {

        const response = await fetch('data/projects.json');

        if (!response.ok) {
            throw new Error('Unable to load projects.json');
        }

        const projects = await response.json();

        const bounds = [];

        projects.forEach(project => {

            if (!project.lat || !project.lng) return;

            const technologies = Array.isArray(project.technologies)
                ? project.technologies.join(', ')
                : project.technologies || '';

            const popup = `
                <div style="min-width:250px;">
                    <h3>${project.name || ''}</h3>

                    <strong>Location:</strong><br>
                    ${project.location || ''}<br><br>

                    <strong>Role:</strong><br>
                    ${project.role || ''}<br><br>

                    <strong>Description:</strong><br>
                    ${project.description || ''}<br><br>

                    <strong>Technologies:</strong><br>
                    ${technologies}
                </div>
            `;

            L.marker([project.lat, project.lng])
                .addTo(map)
                .bindPopup(popup);

            bounds.push([project.lat, project.lng]);

        });

        if (bounds.length > 0) {
            map.fitBounds(bounds, {
                padding: [50, 50]
            });
        }

        document.getElementById('status').innerHTML =
            `${projects.length} projects loaded`;

    }
    catch(error) {

        console.error(error);

        document.getElementById('status').innerHTML =
            'Error loading project data';

    }
}

loadProjects();

</script>
